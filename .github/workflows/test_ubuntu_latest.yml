name: test (ubuntu-latest)

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - name: checkout
        uses: actions/checkout@v4

      - name: toolchain versions
        run: |
          cmake --version
          g++ --version
          cc --version

      - name: configure
        run: cmake -B build

      - name: build
        run: cmake --build build -j

      - name: test
        working-directory: build
        run: ctest --output-on-failure
